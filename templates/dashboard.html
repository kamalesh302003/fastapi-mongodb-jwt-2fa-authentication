<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .dashboard-card {
            text-align: center;
        }

        .dashboard-card h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .welcome-text {
            color: #4a5a70;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .badge {
            display: inline-block;
            background: rgba(100, 180, 120, 0.20);
            border: 1px solid rgba(80, 160, 100, 0.35);
            color: #2a6a40;
            padding: 0.35rem 1rem;
            border-radius: 20px;
            font-size: 0.82rem;
            margin-bottom: 2rem;
        }

        .dashboard-actions {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .btn-action {
            width: 100%;
            height: 46px;
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.55);
            color: #3a4a5c;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.85);
        }

        .btn-logout {
            background: rgba(220, 80, 80, 0.12);
            border-color: rgba(200, 60, 60, 0.25);
            color: #7a2020;
        }

        .btn-logout:hover {
            background: rgba(220, 80, 80, 0.22);
        }
    </style>
</head>
<body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="glass-card dashboard-card">
        <h1>DASHBOARD</h1>
        <p class="welcome-text">Welcome back, <strong>{{ username }}</strong></p>
        <div class="badge">✓ 2FA Authenticated</div>

        <div class="dashboard-actions">
            <a href="/2fa/setup/{{ username }}" class="btn-action">⚙ Setup / Reset 2FA</a>
            <a href="/logout" class="btn-logout btn-action">⎋ Logout</a>
        </div>
    </div>
</body>
</html>
