<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Setup 2FA</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .qr-box {
            text-align: center;
            margin: 1.2rem 0;
        }
        .qr-box img {
            width: 180px;
            height: 180px;
            border-radius: 12px;
            background: white;
            padding: 8px;
        }
        .secret-box {
            background: rgba(255,255,255,0.4);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            font-size: 0.8rem;
            color: #3a4a5c;
            word-break: break-all;
            text-align: center;
            margin-bottom: 1.2rem;
        }
        .step {
            font-size: 0.82rem;
            color: #4a5a70;
            margin-bottom: 1.2rem;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="glass-card">
        <h1>SETUP 2FA</h1>

        <p class="step">
            1. Open <strong>Google Authenticator</strong> or <strong>Authy</strong><br>
            2. Tap <strong>+</strong> → <strong>Scan QR code</strong><br>
            3. Scan the QR below, then enter the 6-digit code
        </p>

        <!-- QR Code Image -->
        <div class="qr-box">
            <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code">
        </div>

        <!-- Manual secret key (if can't scan) -->
        <p style="text-align:center; font-size:0.8rem; color:#4a5a70; margin-bottom:0.4rem;">
            Or enter manually:
        </p>
        <div class="secret-box">{{ secret }}</div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <!-- Confirm with OTP -->
        <form action="/2fa/enable" method="post">
            <input type="hidden" name="username" value="{{ username }}">
            <div class="form-group">
                <label>Enter 6-digit code to confirm</label>
                <input
                    type="text"
                    name="otp_code"
                    placeholder="000000"
                    maxlength="6"
                    inputmode="numeric"
                    style="letter-spacing:0.4em; text-align:center; font-size:1.2rem;"
                    required>
            </div>
            <button type="submit" class="btn-signin">ENABLE 2FA</button>
        </form>

        <p class="switch-auth"><a href="/dashboard">← Back to dashboard</a></p>
    </div>
</body>
</html>
